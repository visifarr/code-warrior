<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Warrior</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            font-family: var(--font-family, 'Arial');
            background: var(--bg-color, #f0f2f5);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            transition: all 0.5s;
        }
        .game-container {
            max-width: 600px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.9);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(0,0,0,0.1);
            backdrop-filter: blur(5px);
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }
        .emoji-btn {
            font-size: 28px;
            cursor: pointer;
            background: none;
            border: none;
            transition: transform 0.3s;
        }
        .emoji-btn:hover {
            transform: scale(1.2);
        }
        /* ... (остальные стили без изменений) ... */
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <button id="theme-toggle" class="emoji-btn">🌄</button>
            <h1>Code Warrior</h1>
            <button id="settings-btn" class="emoji-btn">⚙️</button>
        </div>
        
        <div class="difficulty-selector">
            <button class="difficulty-btn active" data-diff="easy">🔢 Обычный</button>
            <button class="difficulty-btn" data-diff="medium">✖️ Усиленный</button>
            <button class="difficulty-btn locked" data-diff="hard">➗ Сложный</button>
            <button class="difficulty-btn" data-diff="timed">⏱️ На время</button>
        </div>
        
        <div id="timer" style="display: none;">⏳ Время: <span id="time-left">0</span>с</div>
        
        <div id="problem">Решите: <span id="task">5 + 3 = ?</span></div>
        <input type="number" id="answer" placeholder="Ваш ответ">
        <button onclick="checkAnswer()">✅ Проверить</button>
        <button class="use-hint" onclick="useHint()">💡 Исп. подсказку (<span id="hints">0</span>)</button>
        <p>💰 Монеты: <span id="coins">0</span></p>
        <a href="shop.html" class="shop-btn">🛒 Магазин</a>
    </div>

    <!-- Модальное окно настроек -->
    <div id="settings-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <h2>⚙️ Настройки</h2>
            <div class="promo-section">
                <input type="text" id="promo-code" placeholder="Введите промокод">
                <button onclick="applyPromoCode()">🎁 Активировать</button>
            </div>
            <div class="achievements-section">
                <h3>🏆 Достижения</h3>
                <p id="current-rank">📌 Текущий ранг: Новичок</p>
                <p id="next-rank">📈 До следующего ранга: 5/5 уровней</p>
            </div>
            <button class="close-btn" onclick="closeModal()">❌ Закрыть</button>
        </div>
    </div>

    <script src="js/game.js"></script>
    <script src="js/settings.js"></script>
    <script src="js/achievements.js"></script>
    <script>
        // Переключение темы
        const themeBtn = document.getElementById('theme-toggle');
        themeBtn.addEventListener('click', () => {
            document.body.classList.toggle('dark-theme');
            themeBtn.textContent = document.body.classList.contains('dark-theme') ? '🌆' : '🌄';
        });

        // Открытие настроек
        document.getElementById('settings-btn').addEventListener('click', () => {
            document.getElementById('settings-modal').style.display = 'block';
            updateRankInfo(); // Обновляем информацию о ранге
        });
    </script>
</body>
</html>
